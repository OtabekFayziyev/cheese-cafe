[build]
  base    = "cheese-full-v6/cheese-app"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--include=dev"
  SECRETS_SCAN_OMIT_KEYS = "VITE_GOOGLE_MAPS_API_KEY"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200